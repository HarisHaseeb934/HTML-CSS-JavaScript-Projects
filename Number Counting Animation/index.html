<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Number Counting Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #212121;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .parent {
            width: 70%;
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            grid-template-rows: repeat(1, 1fr);
            color: white;
            align-items: center;
            justify-items: center;
        }

        .div {
            background-color: #20212c;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: column;
            border-bottom: 10px solid rgb(40, 202, 40);
            border-radius: 20px;
        }
        .div i{
            font-size: 30px;
            color: rgb(40, 202, 40);
        }
        .count-meals {
            font-size: 40px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="div">
            <i class="fa-solid fa-utensils"></i>
            <p class="count-meals" data-val="440">1</p>
            <p>Meals Delivery</p>
        </div>
        <div class="div">
            <i class="fa-solid fa-face-smile"></i>
            <p class="count-meals" data-val="660">1</p>
            <p>Happy Cusotmers</p>
        </div>
        <div class="div">
            <i class="fa-solid fa-list" ></i>
            <p class="count-meals" data-val="280">1</p>
            <p>Menu Items</p>
        </div>
        <div class="div">
            <i class="fa-solid fa-star"></i>
            <p class="count-meals" data-val="780">1</p>
            <p>Five Star</p>
        </div>
    </div>
    <script>
        let value = document.querySelectorAll(".count-meals");
        let interval = 5000;
        value.forEach( (valuedisplay)=>{
            let start = 0;
            let end = parseInt(valuedisplay.getAttribute("data-val"));
            let duration = Math.floor( interval / end);
            let counter = setInterval( ()=>{
                start++;
                valuedisplay.innerText = start;
                if(start === end){
                    clearInterval(counter);
                }
            },duration);
        })
    </script>
</body>

</html>
