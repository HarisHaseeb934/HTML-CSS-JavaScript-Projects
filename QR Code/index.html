<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="head">
            <h1>Enter your text or URL</h1>
        </div>

        <input type="text" id="text" placeholder="Text or URL">
        <div class="qrcode">
            <img src="" alt="" id="img">
        </div>
        
        <button id="gen">QR Code</button>
    </div>
    <script src="app.js"></script>
</body>

</html>
