<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="heading">
            <h1>To-Do List</h1>
            <img src="pencil.png" alt="">
        </div>
        <div class="todo">
            <input type="text" name="" id="" placeholder="Add your task" class="input-text">
            <button class="add">Add</button>
        </div>
        <div class="list">
            <ul class="ul">
            </ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
