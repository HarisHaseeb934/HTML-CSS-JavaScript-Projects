<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Form</title>
</head>
<body>
    <div id="container">
        <div id="logo"><i class="fa-solid fa-paper-plane"></i></div>
        <form action="">
            <div class="input">
                <label for="">Name</label>
                <input type="text" placeholder="Enter Your Name" id="name" onkeyup="validatename()">
                <span id="name-error"></span>
            </div>
            <div class="input">
                <label for="">Phone No.</label>
                <input type="number" placeholder="Enter Your Name" id="phone" onkeyup="validatephone()">
                <span id="phone-error"></span>
            </div>
            <div class="input">
                <label for="">Email Id</label>
                <input type="email" placeholder="Enter Your Name" id="email" onkeyup="validateemail()">
                <span id="email-error"></span>
            </div>
            <div class="input">
                <label for="">Your Message</label>
                <input type="text-area" placeholder="Enter Your Name" id="message" onkeyup="validatetext()">
                <span id="text-error"></span>
            </div>
            <button id="submit">Submit</button>
            <span id="submit-error" ></span>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
